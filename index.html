<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */

    .container{
      display:grid;
      grid-template:414px 130px 155px 20px/320px 198px 153px 50px;
      gap:9px;
      background-color: #000;
      width:fit-content;
    
    }

   

    .red{
      background-color:#E72F24;
      grid-area:1/1/2/2;
    }

    .blue{
      background-color: #004592;
      grid-area:2/4/3/5;
      border-bottom:10px solid black;
    }

    .black{
      background-color: #232629;
      grid-area:4/3/5/4;
    }

    .yellow{  
      background-color: #F9D01E;
      grid-area:4/2/5/3;
    }

      .grey1{
      background-color: #F0F1EC;
      grid-area:1/2/2/5;
    }

    .grey2{
      background-color: #F0F1EC;
      grid-area:2/1/4/2;
    }

    .grey3{
      background-color: #F0F1EC;
      grid-area:4/1/5/2;
    }

    .grey4{
      background-color: #F0F1EC;
      grid-area:3/4/5/5;
    }

    .grey5{
       background-color: #F0F1EC;
      grid-area:2/2/4/4;
    }

    .flex{
      display:flex;
      justify-content: center;
      align-items:center;
      height:100vh;
       margin:0px;
      padding:0px;
    }

    
    
    
  </style>
</head>

<body>
  <!-- Write your HTML here -->
   <div class="flex">
   <div class="container">
    <div class="item red"></div>
    <div class="item grey1"></div>
       <div class="item grey2"></div>
       <div class="item grey3"></div>
       <div class="item grey4"></div>
       <div class="item grey5"></div>
    <div class="item yellow"></div>
    <div class="item black"></div>
    <div class="item blue"></div>
   </div>
   </div>
</body>

</html>
